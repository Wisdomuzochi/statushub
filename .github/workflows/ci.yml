name: CI — StatusHub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Tests Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: statushub_user
          POSTGRES_PASSWORD: statushub_secret
          POSTGRES_DB: statushub_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          POSTGRES_USER: statushub_user
          POSTGRES_PASSWORD: statushub_secret
          POSTGRES_DB: statushub_db
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          CHECK_INTERVAL: 30
        run: |
          cd backend
          pytest tests/ -v

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t statushub-api ./backend
          echo "✅ Image Docker construite avec succès"